name: ciro_app
description: CIRO — Crisis Intelligence & Response Orchestrator
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & WebSocket
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  
  # Charts
  fl_chart: ^0.66.0
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  
  # URL launcher (for opening web map)
  url_launcher: ^6.2.1
  
  # Utils
  intl: ^0.19.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
